<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>嬰幼兒用品監測站・管理版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

:root{
  --bg:#FBF1E4;
  --card:#FFFDF8;
  --card-alt:#FFF6E8;
  --ink:#4A3B2E;
  --ink-soft:#8C7A66;
  --line:#EAD9BE;
  --coral:#E8896B;
  --coral-dark:#D5704F;
  --positive:#6F9C76;
  --positive-bg:#E6F0E2;
  --neutral:#C99A3A;
  --neutral-bg:#FBEFD3;
  --negative:#D97757;
  --negative-bg:#FBE3D7;
  --yellow:#F3CD66;
  --mint:#A8CFC0;
  --skyblue:#A9C9E0;
  --radius:18px;
  --radius-sm:12px;
}

*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;}
.app{max-width:1100px;margin:0 auto;padding:30px 20px 56px;}

header{position:relative;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:20px;flex-wrap:wrap;padding-right:90px;}
.title-group{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.title-group h1{font-family:'Baloo 2','Noto Sans TC',sans-serif;font-weight:700;font-size:27px;margin:0;color:var(--coral-dark);}
.mode-tag{font-family:'Baloo 2',sans-serif;font-size:11px;font-weight:600;letter-spacing:.04em;background:var(--coral);color:#fff;padding:4px 11px;border-radius:999px;}
.title-group p{margin:6px 0 0;color:var(--ink-soft);font-size:13.5px;width:100%;}
.add-toggle-btn{font-family:'Baloo 2',sans-serif;font-weight:600;font-size:13.5px;background:var(--coral);color:#fff;border:none;border-radius:999px;padding:11px 20px;cursor:pointer;white-space:nowrap;box-shadow:0 3px 8px rgba(216,113,79,.25);}
.add-toggle-btn:hover{background:var(--coral-dark);}

.confetti{position:absolute;top:-6px;right:0;width:80px;height:80px;pointer-events:none;}
.confetti .c{position:absolute;border-radius:50%;}
.confetti .c1{width:20px;height:20px;background:var(--yellow);top:4px;right:46px;}
.confetti .c2{width:14px;height:14px;background:var(--skyblue);top:30px;right:10px;border-radius:4px;transform:rotate(20deg);}
.confetti .c3{width:11px;height:11px;background:var(--mint);top:54px;right:54px;}
.confetti .c4{width:9px;height:9px;background:var(--coral);top:0;right:8px;}

.token-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:20px;padding:12px 16px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);}
.token-row label{font-size:12.5px;font-weight:700;color:var(--ink-soft);white-space:nowrap;}
.token-row input{flex:1;min-width:200px;font-family:monospace;font-size:12.5px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);}
.token-row button{font-family:'Baloo 2',sans-serif;font-weight:600;font-size:12.5px;background:var(--ink);color:var(--bg);border:none;border-radius:8px;padding:8px 14px;cursor:pointer;white-space:nowrap;}
.token-status{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;}
.token-status.ok{color:var(--positive);}

.tab-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tab{font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:14.5px;padding:9px 22px;border:1.5px solid var(--line);border-radius:999px;background:var(--card);color:var(--ink-soft);cursor:pointer;}
.tab .en{display:block;font-size:9.5px;letter-spacing:.06em;font-weight:500;opacity:.7;margin-top:1px;}
.tab.active{background:var(--coral);color:#fff;border-color:var(--coral);}
.tab:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--coral-dark);outline-offset:2px;}

.toolbar{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
.refresh-all-btn{font-family:'Baloo 2',sans-serif;font-weight:600;font-size:13px;background:var(--card);border:1.5px solid var(--coral);color:var(--coral-dark);border-radius:999px;padding:9px 16px;cursor:pointer;}
.refresh-all-btn:hover{background:var(--coral);color:#fff;}
.refresh-all-btn:disabled{opacity:.5;cursor:default;}
.progress-text{font-size:12px;color:var(--ink-soft);}
.error-text{font-size:12px;color:var(--negative);}

.add-form{display:none;gap:10px;align-items:center;margin:-6px 0 18px;padding:14px 16px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius-sm);flex-wrap:wrap;}
.add-form.open{display:flex;}
.add-form input{flex:1;min-width:180px;font-family:'Noto Sans TC',sans-serif;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);}
.add-form button{font-family:'Baloo 2',sans-serif;font-weight:600;font-size:13px;background:var(--coral);color:#fff;border:none;border-radius:10px;padding:9px 16px;cursor:pointer;white-space:nowrap;}

.list-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);box-shadow:0 4px 14px rgba(180,140,90,.08);}
.empty-note{color:var(--ink-soft);font-size:14px;padding:20px;}

.filter-bar{display:none;flex-wrap:wrap;gap:6px;margin:-4px 0 18px;}
.filter-chip{font-family:'Noto Sans TC',sans-serif;font-size:12.5px;background:var(--card);border:1px solid var(--line);color:var(--ink-soft);border-radius:999px;padding:6px 13px;cursor:pointer;}
.filter-chip:hover{border-color:var(--coral);}
.filter-chip.active{background:var(--coral);color:#fff;border-color:var(--coral);}

.brand-table{width:100%;border-collapse:collapse;font-size:13px;min-width:820px;}
.brand-table thead th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.03em;color:var(--ink-soft);background:var(--card-alt);padding:10px 14px;border-bottom:1.5px solid var(--line);white-space:nowrap;}
.brand-table tbody tr{border-bottom:1px solid var(--line);transition:background .15s;}
.brand-table tbody tr:last-child{border-bottom:none;}
.brand-table tbody tr:hover{background:var(--card-alt);}
.brand-table tbody tr.scanning{background:var(--neutral-bg);}
.brand-table td{padding:11px 14px;vertical-align:top;color:var(--ink);}
.brand-table td.name-cell{font-weight:700;white-space:nowrap;}

.status-pill{display:inline-block;padding:3px 11px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap;}
.status-pill.positive{background:var(--positive-bg);color:var(--positive);}
.status-pill.neutral{background:var(--neutral-bg);color:var(--neutral);}
.status-pill.negative{background:var(--negative-bg);color:var(--negative);}
.status-pill.pending{background:var(--card-alt);color:var(--ink-soft);}

.series-cell{display:flex;flex-wrap:wrap;gap:4px;max-width:230px;}
.flag-chip{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:2px 8px;white-space:nowrap;}
.flag-chip.unknown{color:var(--ink-soft);}

.news-cell,.social-cell{max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.negative-flag{display:inline-block;font-size:10px;font-weight:700;background:var(--negative-bg);color:var(--negative);padding:2px 8px;border-radius:999px;letter-spacing:.02em;margin-bottom:3px;white-space:nowrap;}

.updated-cell{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;}
.panel-link{font-family:'Noto Sans TC',sans-serif;font-weight:700;font-size:12px;background:none;border:none;color:var(--coral-dark);cursor:pointer;padding:0;white-space:nowrap;text-decoration:underline;text-decoration-color:transparent;transition:text-decoration-color .15s;}
.panel-link:hover{text-decoration-color:var(--coral-dark);}

.row-delete{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:16px;line-height:1;padding:0;}
.row-delete:hover{color:var(--negative);}

.panel-backdrop{position:fixed;inset:0;background:rgba(74,59,46,.35);opacity:0;visibility:hidden;transition:opacity .2s;z-index:40;}
.panel-backdrop.open{opacity:1;visibility:visible;}
.panel{position:fixed;top:0;right:0;height:100vh;width:380px;max-width:92vw;background:var(--card);border-left:1px solid var(--line);box-shadow:-8px 0 24px rgba(120,90,50,.12);transform:translateX(100%);transition:transform .25s ease;z-index:50;display:flex;flex-direction:column;}
.panel.open{transform:translateX(0);}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line);background:var(--card-alt);}
.panel-header h3{margin:0;font-size:16px;font-weight:700;color:var(--ink);}
.panel-close{background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer;line-height:1;padding:0;}
.panel-close:hover{color:var(--negative);}
.panel-body{flex:1;overflow-y:auto;padding:6px 20px 24px;}
.panel-item{padding:13px 0;border-bottom:1px solid var(--line);}
.panel-item:last-child{border-bottom:none;}
.panel-item-tag{font-size:10.5px;font-weight:700;letter-spacing:.03em;color:var(--ink-soft);display:inline-block;margin-bottom:5px;}
.panel-item-title{font-size:13.5px;line-height:1.55;margin:0 0 5px;color:var(--ink);}
.panel-item-link{font-size:11.5px;font-weight:700;color:var(--coral-dark);text-decoration:none;}
.panel-item-link:hover{text-decoration:underline;}
@media (max-width:560px){.panel{width:100vw;}}

footer.disclaimer{margin-top:32px;font-size:11.5px;color:var(--ink-soft);line-height:1.6;border-top:1px solid var(--line);padding-top:14px;}

@media (max-width:560px){
  header{flex-direction:column;align-items:flex-start;padding-right:0;}
  .confetti{display:none;}
  .tab{padding:8px 16px;font-size:13.5px;}
}
</style>
</head>

<div class="app">
  <header>
    <div class="confetti" aria-hidden="true"><span class="c c1"></span><span class="c c2"></span><span class="c c3"></span><span class="c c4"></span></div>

      <h1>嬰幼兒用品監測站</h1>

    </div>
    <button class="add-toggle-btn" id="addToggleBtn">+ 新增品牌</button>
  </header>

  <div class="filter-bar" id="filterBar"></div>

  <div class="toolbar">
    <button class="refresh-all-btn" id="refreshAllBtn">重新整理目前分類全部品牌</button>
    <span class="progress-text" id="progressText"></span>
    <span class="error-text" id="errorText"></span>
  </div>

  <div class="list-wrap">
    <table class="brand-table">
      <thead>

        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <footer class="disclaimer">
    這是純前端頁面，所有資料透過 API 跟後端溝通（規格見 API-CONTRACT.md）。後端用什麼資料庫、AI查詢怎麼做，前端不需要知道。
  </footer>
</div>

<div class="panel-backdrop" id="panelBackdrop"></div>
<aside class="panel" id="panel">
  <div class="panel-header">
    <h3 id="panelTitle"></h3>
    <button class="panel-close" id="panelClose" aria-label="關閉面板">×</button>
  </div>
  <div class="panel-body" id="panelBody"></div>
</aside>

  {names:['法國','France'], flag:'🇫🇷', label:'法國'},
  {names:['瑞士','Switzerland'], flag:'🇨🇭', label:'瑞士'},
  {names:['義大利','Italy'], flag:'🇮🇹', label:'義大利'},
  {names:['西班牙','Spain'], flag:'🇪🇸', label:'西班牙'},
  {names:['英國','UK','United Kingdom'], flag:'🇬🇧', label:'英國'},
  {names:['愛爾蘭','Ireland'], flag:'🇮🇪', label:'愛爾蘭'},
  {names:['丹麥','Denmark'], flag:'🇩🇰', label:'丹麥'},
  {names:['瑞典','Sweden'], flag:'🇸🇪', label:'瑞典'},
  {names:['波蘭','Poland'], flag:'🇵🇱', label:'波蘭'},
  {names:['紐西蘭','New Zealand'], flag:'🇳🇿', label:'紐西蘭'},
  {names:['澳洲','Australia'], flag:'🇦🇺', label:'澳洲'},
  {names:['加拿大','Canada'], flag:'🇨🇦', label:'加拿大'}
];

function parseCountries(str){
  if(!str) return [];
  const found = [];
  for(const c of COUNTRY_PATTERNS){
    if(c.names.some(n=>str.includes(n)) && !found.some(f=>f.label===c.label)){
      found.push(c);
    }
  }
  return found;
}

function escapeHtml(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatTime(ts){
  if(!ts) return '';
  const d = new Date(ts);
  const p = n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function sentimentLabel(s){
  if(s==='positive') return '正常';
  if(s==='neutral') return '普通';
  if(s==='negative') return '注意';
  return '—';
}

function showError(msg){
  document.getElementById('errorText').textContent = msg || '';
}

async function loadBrands(){
  showError('');
  brandsByCategory = makeMockData();
}

function renderTabs(){
  const bar = document.getElementById('tabBar');
  bar.innerHTML = CATEGORIES.map(c=>`
    <button class="tab ${c.key===activeCat?'active':''}" data-cat="${c.key}">
      ${c.zh}<span class="en">${c.en}</span>
    </button>
  `).join('');
  bar.querySelectorAll('.tab').forEach(btn=>{
    btn.addEventListener('click', ()=>switchTab(btn.dataset.cat));
  });
}

function switchTab(cat){
  activeCat = cat;
  countryFilter = null;
  renderTabs();
  document.getElementById('addForm').classList.remove('open');
  renderTable();
}

function allCountriesOf(brand){
  if(!brand || !brand.series) return [];
  let all = [];
  brand.series.forEach(s=>{ all = all.concat(parseCountries(s.origin)); });
  return all;
}

function seriesChipsHtml(seriesArr){
  if(!seriesArr || seriesArr.length===0) return '<span style="color:var(--ink-soft);font-size:12.5px;">暫無資料</span>';
  return seriesArr.map(s=>{
    const countries = parseCountries(s.origin);
    const flags = countries.length ? countries.map(c=>c.flag).join('') : '🏳️';
    return `<span class="flag-chip" title="${escapeHtml(s.name||'')}：${escapeHtml(s.origin||'')}">${flags} ${escapeHtml(s.name || '未命名系列')}</span>`;
  }).join('');
}

function rowTemplate(brand){
  const statusClass = brand.sentiment || 'neutral';
  const statusText = sentimentLabel(brand.sentiment);
  const newsItems = brand.news_items || [];
  const socialItems = brand.social_items || [];
  const totalItems = newsItems.length + socialItems.length;
  const latestNews = newsItems[0];
  const latestSocial = socialItems[0];
  const newsText = latestNews ? latestNews.title : '暫無相關新聞';
  const socialText = latestSocial ? latestSocial.title : '暫無相關討論';

  return `
    <tr data-id="${escapeHtml(brand.id)}">
      <td class="name-cell">${escapeHtml(brand.name)}</td>
      <td><span class="status-pill ${statusClass}">${escapeHtml(statusText)}</span></td>
      <td><div class="series-cell">${seriesChipsHtml(brand.series)}</div></td>
      <td class="news-cell" title="${escapeHtml(newsText)}">
        ${brand.has_negative ? '<span class="negative-flag">含負面新聞</span><br>' : ''}${escapeHtml(newsText)}
      </td>
      <td class="social-cell" title="${escapeHtml(socialText)}">${escapeHtml(socialText)}</td>
      <td>${ totalItems>0 ? `<button class="panel-link" data-action="panel">${totalItems}則 →</button>` : '—' }</td>
      <td class="updated-cell">${brand.updated_at ? formatTime(brand.updated_at) : '尚未更新'}</td>
      <td><button class="row-delete" data-action="delete" title="移除品牌" aria-label="移除品牌">×</button></td>
    </tr>
  `;
}

function renderFilterBar(){
  const bar = document.getElementById('filterBar');
  if(activeCat !== 'diaper'){ bar.innerHTML=''; bar.style.display='none'; return; }
  const list = brandsByCategory.diaper || [];
  const map = new Map();
  list.forEach(b=>{ allCountriesOf(b).forEach(c=>map.set(c.label, c.flag)); });
  if(map.size===0){ bar.innerHTML=''; bar.style.display='none'; return; }
  bar.style.display = 'flex';
  const chips = [`<button class="filter-chip ${!countryFilter?'active':''}" data-country="">全部</button>`];
  map.forEach((flag,label)=>{
    chips.push(`<button class="filter-chip ${countryFilter===label?'active':''}" data-country="${escapeHtml(label)}">${flag} ${escapeHtml(label)}</button>`);
  });
  bar.innerHTML = chips.join('');
  bar.querySelectorAll('.filter-chip').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      countryFilter = btn.dataset.country || null;
      renderTable();
    });
  });
}

function renderTable(){
  const tbody = document.getElementById('tableBody');
  renderFilterBar();
  let list = brandsByCategory[activeCat] || [];
  if(activeCat==='diaper' && countryFilter){
    list = list.filter(b=> allCountriesOf(b).some(c=>c.label===countryFilter));
  }
  if(list.length===0){
    const msg = (activeCat==='diaper' && countryFilter)
      ? '這個國家目前沒有符合的品牌資料，換一個篩選看看。'
      : '這個分類還沒有品牌，點右上角「+ 新增品牌」加入第一個。';
    tbody.innerHTML = `<tr><td colspan="8" class="empty-note">${msg}</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(b=>rowTemplate(b)).join('');
  tbody.querySelectorAll('tr[data-id]').forEach(rowEl=>{
    const id = rowEl.dataset.id;
    rowEl.querySelector('[data-action="delete"]').addEventListener('click', ()=>deleteBrand(id));
    const panelBtn = rowEl.querySelector('[data-action="panel"]');
    if(panelBtn) panelBtn.addEventListener('click', ()=>openPanel(id));
  });
}

function openPanel(id){
  const brand = (brandsByCategory[activeCat]||[]).find(b=>b.id===id);
  if(!brand) return;
  document.getElementById('panelTitle').textContent = brand.name;
  const items = [
    ...(brand.news_items||[]).map(it=>({...it, type:'新聞'})),
    ...(brand.social_items||[]).map(it=>({...it, type:'社群'}))
  ];
  const body = document.getElementById('panelBody');
  if(items.length===0){
    body.innerHTML = '<p class="empty-note">目前沒有查到相關消息。</p>';
  } else {
    body.innerHTML = items.map(it=>`
      <div class="panel-item">
        <span class="panel-item-tag">${escapeHtml(it.type)}${it.source ? ' · '+escapeHtml(it.source) : ''}</span>
        <p class="panel-item-title">${escapeHtml(it.title || '(無標題)')}</p>
        ${it.url ? `<a class="panel-item-link" href="${escapeHtml(it.url)}" target="_blank" rel="noopener">查看原文 →</a>` : ''}
      </div>
    `).join('');
  }
  document.getElementById('panel').classList.add('open');
  document.getElementById('panelBackdrop').classList.add('open');
}
function closePanel(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panelBackdrop').classList.remove('open');
}

function uid(){ return Math.random().toString(36).slice(2,9); }

async function addBrand(){
  const input = document.getElementById('newBrandInput');
  const name = input.value.trim();
  if(!name) return;
  showError('');
  const created = {
    id: uid(), name,
    sentiment:'neutral', has_negative:false,
    series:[], news_items:[], social_items:[],
    updated_at: null
  };
  (brandsByCategory[activeCat] = brandsByCategory[activeCat]||[]).push(created);
  input.value = '';
  document.getElementById('addForm').classList.remove('open');
  renderTable();
}

async function deleteBrand(id){
  showError('');
  brandsByCategory[activeCat] = (brandsByCategory[activeCat]||[]).filter(b=>b.id!==id);
  renderTable();
}

const MOCK_SENTIMENTS = ['positive','neutral','negative'];
const MOCK_NEWS_POOL = [
  {title:'品牌官方發布新一季品質報告',source:'品牌新聞稿',url:''},
  {title:'部分通路反映到貨時間延後',source:'通路公告',url:''},
  {title:'消費者論壇討論近期包裝改版',source:'消費者論壇',url:''}
];
const MOCK_SOCIAL_POOL = [
  {title:'社團熱烈討論近期使用心得',source:'FB社團',url:''},
  {title:'Threads上出現多篇開箱分享',source:'Threads',url:''}
];

async function refreshBrand(id, rowEl){
  if(rowEl) rowEl.classList.add('scanning');
  await new Promise(r=>setTimeout(r, 1200 + Math.random()*1400)); // 模擬查詢耗時，假資料模式不會真的打API
  const idx = (brandsByCategory[activeCat]||[]).findIndex(b=>b.id===id);
  if(idx>-1){
    const brand = brandsByCategory[activeCat][idx];
    brand.sentiment = MOCK_SENTIMENTS[Math.floor(Math.random()*MOCK_SENTIMENTS.length)];
    brand.has_negative = brand.sentiment === 'negative';
    if(Math.random()>0.4){
      brand.news_items = [MOCK_NEWS_POOL[Math.floor(Math.random()*MOCK_NEWS_POOL.length)], ...(brand.news_items||[])].slice(0,5);
    }
    if(Math.random()>0.4){
      brand.social_items = [MOCK_SOCIAL_POOL[Math.floor(Math.random()*MOCK_SOCIAL_POOL.length)], ...(brand.social_items||[])].slice(0,5);
    }
    brand.updated_at = Date.now();
  }
  if(rowEl) rowEl.classList.remove('scanning');
}

async function refreshAll(){
  const list = brandsByCategory[activeCat]||[];
  if(list.length===0) return;
  const btn = document.getElementById('refreshAllBtn');
  const progress = document.getElementById('progressText');
  btn.disabled = true;
  for(let i=0;i<list.length;i++){
    progress.textContent = `查詢中 (${i+1}/${list.length})：${list[i].name}`;
    const rowEl = document.querySelector(`tr[data-id="${list[i].id}"]`);
    await refreshBrand(list[i].id, rowEl);
    renderTable();
  }
  progress.textContent = '';
  btn.disabled = false;
}

function saveToken(){
  authToken = document.getElementById('tokenInput').value.trim();
  localStorage.setItem('admin_token', authToken);
  updateTokenStatus();
}
function updateTokenStatus(){
  const status = document.getElementById('tokenStatus');
  if(authToken){
    status.textContent = '已設定';
    status.className = 'token-status ok';
  } else {
    status.textContent = '尚未設定';
    status.className = 'token-status';
  }
}

async function init(){
  document.getElementById('tokenInput').value = authToken;
  updateTokenStatus();

  await loadBrands();
  renderTabs();
  renderTable();

  document.getElementById('tokenSaveBtn').addEventListener('click', saveToken);
  document.getElementById('refreshAllBtn').addEventListener('click', refreshAll);
  document.getElementById('addToggleBtn').addEventListener('click', ()=>{
    document.getElementById('addForm').classList.toggle('open');
  });
  document.getElementById('addBrandBtn').addEventListener('click', addBrand);
  document.getElementById('newBrandInput').addEventListener('keydown', e=>{
    if(e.key==='Enter') addBrand();
  });
  document.getElementById('panelClose').addEventListener('click', closePanel);
  document.getElementById('panelBackdrop').addEventListener('click', closePanel);
  document.addEventListener('keydown', e=>{
    if(e.key==='Escape') closePanel();
  });
}

init();
</script>
